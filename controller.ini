[core]
name: worldController
class: CustomUnitMetadata
price: 0
maxHp: 100
isUnselectable: true
canNotBeDirectlyAttacked: true
showOnMinimap: false

# =========================
# AUTO START
# =========================
[hiddenAction_start]
autoTrigger: true
alsoQueueAction: time_day
alsoQueueAction: weatherRoll

# =========================
# TIME SYSTEM (7 min per stage)
# =========================
# Only host triggers time changes
[hiddenAction_time_day]
onlyHost: true
spawnEffects: CUSTOM:clearTint
alsoQueueAction: time_sunset
delay: 420

[hiddenAction_time_sunset]
onlyHost: true
spawnEffects: CUSTOM:sunsetFade
alsoQueueAction: time_night
delay: 420

[hiddenAction_time_night]
onlyHost: true
spawnEffects: CUSTOM:nightFade
alsoQueueAction: time_midnight
delay: 420

[hiddenAction_time_midnight]
onlyHost: true
spawnEffects: CUSTOM:midnightFade
alsoQueueAction: time_day
delay: 420

# =========================
# WEATHER SYSTEM (weighted)
# =========================
# Only host rolls weather; clients mirror
[hiddenAction_weatherRoll]
onlyHost: true
autoTrigger: true
repeatDelay: 300
alsoQueueAction: weatherPick

[hiddenAction_weatherPick]
# Probabilistic roll for LAN
spawnEffects: CUSTOM:clearTint
alsoQueueAction: weatherRoll
# Use multiple hidden actions to simulate probability
# Clear 50%
[hiddenAction_clear]
spawnEffects: NONE
# Rain 20%
[hiddenAction_rain]
spawnEffects: CUSTOM:rain
# Fog 20%
[hiddenAction_fog]
spawnEffects: CUSTOM:fog
# Storm 10%
[hiddenAction_storm]
spawnEffects: CUSTOM:rain, CUSTOM:fog, CUSTOM:lightningFlash

# =========================
# TIME OVERLAY EFFECTS
# =========================
[effect_clearTint]
life: 120
fadeInTime: 120
alpha: 0.0
scaleFrom: 30
scaleTo: 30
color: #FFFFFF

[effect_sunsetFade]
life: 120
fadeInTime: 120
alpha: 0.25
scaleFrom: 30
scaleTo: 30
color: #FF8844

[effect_nightFade]
life: 120
fadeInTime: 120
alpha: 0.4
scaleFrom: 30
scaleTo: 30
color: #000033

[effect_midnightFade]
life: 120
fadeInTime: 120
alpha: 0.55
scaleFrom: 30
scaleTo: 30
color: #000011

# =========================
# WEATHER EFFECTS
# =========================
[effect_rain]
life: 40
alpha: 0.25
xSpeedRelativeRandom: 0.3
ySpeedRelative: 3
scaleFrom: 0.2
scaleTo: 0.2
color: #AACCFF

[effect_fog]
life: 200
alpha: 0.2
scaleFrom: 20
scaleTo: 22
color: #CCCCCC

[effect_lightningFlash]
life: 20
alpha: 0.7
fadeOut: true
color: #FFFFFF
scaleFrom: 35
scaleTo: 35
